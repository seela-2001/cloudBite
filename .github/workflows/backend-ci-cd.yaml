name: Backend-CICD

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Get current backend version
        id: version
        run: |
          CURRENT_VERSION=$(awk '
            /backend:/ {found=1}
            found && /tag:/ {
              gsub(/"/, "", $2)
              print $2
              exit
            }
          ' cloudbite-chart/values.yaml)

          echo "Current version: $CURRENT_VERSION"

          IFS='.' read -r major minor patch <<< "$CURRENT_VERSION"

          NEW_PATCH=$((patch + 1))

          NEW_VERSION="$major.$minor.$NEW_PATCH"

          echo "New version: $NEW_VERSION"

          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ vars.DOCKERHUB_USERNAME }}/cloudbite-backend:${{ steps.version.outputs.version }}

      - name: Update backend Helm tag only
        run: |
          sed -i '/backend:/,/frontend:/ s/tag:.*/tag: "${{ steps.version.outputs.version }}"/' cloudbite-chart/values.yaml

      - name: Commit updated Helm values
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add cloudbite-chart/values.yaml
          git commit -m "ci: update backend image to ${{ steps.version.outputs.version }}" || echo "No changes"

          git push
