name: Frontend-CICD 

on: 
  push: 
    paths: 
      - 'frontend/**' 
    branches: 
      - main 

jobs: 
  build: 
    runs-on: ubuntu-latest 
    
    steps: 
      - uses: actions/checkout@v4
      - name: Login DockerHub 
        uses: docker/login-action@v3
        with: 
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }} 
      
      - name: Build and Push Frontend Image 
        uses: docker/build-push-action@v5
        with: 
          context: ./frontend 
          push: true 
          tags: | 
            ${{ vars.DOCKERHUB_USERNAME }}/cloudbite-frontend:${{ github.sha }}          
      
      - name: Update Helm values
        run: |
          sed -i "s|tag:.*|tag: ${{ github.sha }}|" cloudbite-chart/values.yaml

      - name: Commit updated Helm values
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add cloudbite-chart/values.yaml
          git commit -m "update frontend image tag to ${{ github.sha }}"
          git push
