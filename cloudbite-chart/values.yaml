backend:
  image:
    repository: sohila12/cloudbite-backend
    tag: "1.0.1"
  service:
    port: 4000
  replicas: 2
  resources:
    requests:
      cpu: 100m
      memory: 128Mi

    limits:
      cpu: 500m
      memory: 512Mi

frontend:
  image:
    repository: sohila12/cloudbite-frontend
    tag: "1.0.2"
  service:
    port: 80
  replicas: 2

mongodb:
  image:
    repository: mongo
    tag: "8:0"
  service:
    port: 27017
  replicas: 2
  storage: 1Gi