apiVersion: apps/v1
kind: Deployment 
metadata:
  name: mongodb-deployment
  labels:
    app: mongodb

spec:
  replicas: {{ .Values.mongodb.replicas }}
  selector:
    matchLabels: 
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      containers:
        - name: mongodb
          image: {{ .Values.mongodb.image }}
          ports:
            - containerPort: {{ .Values.mongodb.ports }}
          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: mongodb-secret 
                  key: MONGO_INITDB_ROOT_USERNAME
            - name: MONGO_INITDB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mongodb-secret
                  key: MONGO_INITDB_ROOT_PASSWORD   
          volumeMounts:
            - name: mongodb-data 
              mountPath: /data/db
      volumes:
        - name: mongodb-data 
          persistentVolumeClaim: 
            claimName: mongodb-pvc
