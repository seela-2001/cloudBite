apiVersion: apps/v1 
kind: Deployment 
metadata:  
  name: frontend-deployment 
  namespace: cloudbite-dev 
  labels: 
    app: frontend 
    env: dev 
spec: 
  replicas: 1 
  selector: 
    matchLabels: 
      app: frontend 
      env: dev 
  template: 
    metadata: 
      labels: 
        app: frontend 
        env: dev 
    spec:
      containers: 
        - name: frontend 
          image: sohila12/cloudbite-frontend:v1
          imagePullPolicy: Always
          ports: 
            - containerPort: 3000
