services:
  backend:
    build:
      context: ./backend
    container_name: cloudbite-backend
    ports:
      - "4000:4000"
    env_file:
      - ./backend/.env
    depends_on:
      - mongodb
    restart: unless-stopped
    
  frontend:
    build:
      context: ./frontend
    container_name: cloudbite-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped 

  mongodb:
    image: mongo:8.0
    container_name: cloudbite-mongodb
    ports:
      - "27017:27017"
    env_file:
      - ./backend/.env
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5




volumes:
  mongodb_data: